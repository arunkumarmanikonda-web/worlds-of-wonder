<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passport Sales Portal — Worlds of Wonder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--gold:#C9A84C;--gold-light:#F0D080;--gold-dark:#9A6F2A;--wow-blue:#003087;--wow-red:#E31837;--bg:#0a0a14;--card:#12122a;--border:#2a2a4a;--text:#f0f0f0;--muted:#8888aa}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .bg-anim{position:fixed;inset:0;z-index:0;overflow:hidden}
    .bg-anim::before{content:'';position:absolute;width:800px;height:800px;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);top:-200px;left:-200px;animation:float1 12s ease-in-out infinite}
    .bg-anim::after{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,48,135,.2) 0%,transparent 70%);bottom:-100px;right:-100px;animation:float2 10s ease-in-out infinite}
    @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
    @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-30px)}}
    .stars{position:fixed;inset:0;z-index:0}
    .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite}
    @keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
    .login-wrap{position:relative;z-index:10;width:100%;max-width:480px;padding:20px}
    .brand-header{text-align:center;margin-bottom:28px}
    .brand-badge{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#1a1a3e,#12122a);border:1px solid var(--gold);border-radius:16px;padding:14px 24px;margin-bottom:14px;box-shadow:0 0 40px rgba(201,168,76,.2)}
    .brand-logo{height:48px;width:auto;object-fit:contain;display:block;}
    .brand-badge-text .brand-name{font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
    .brand-badge-text .brand-sub{font-size:.72rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
    .page-title{font-size:1.5rem;font-weight:800;color:#fff}
    .page-title span{color:var(--gold)}
    .page-sub{font-size:.85rem;color:var(--muted);margin-top:4px}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .login-card h2{font-size:1.1rem;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:8px}
    .login-card h2 i{color:var(--gold)}
    .field-group{margin-bottom:16px}
    .field-group label{display:block;font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
    .input-wrap{position:relative}
    .input-wrap i.fi{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.88rem}
    .input-wrap input{width:100%;background:#0d0d22;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px 11px 38px;color:#fff;font-size:.92rem;font-family:'Nunito',sans-serif;transition:border-color .2s;outline:none}
    .input-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
    .input-wrap input::placeholder{color:#44446a}
    .toggle-pw{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);background:none;border:none;font-size:.88rem;transition:color .2s}
    .toggle-pw:hover{color:var(--gold)}
    .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .role-option input[type=radio]{position:absolute;opacity:0;width:0;height:0}
    .role-option{position:relative}
    .role-option label{display:flex;align-items:center;gap:9px;background:#0d0d22;border:1.5px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;transition:all .2s}
    .role-option label i{font-size:1.1rem;color:var(--muted)}
    .role-option label span{font-size:.82rem;font-weight:600;color:var(--muted)}
    .role-option input:checked + label{border-color:var(--gold);background:rgba(201,168,76,.1)}
    .role-option input:checked + label i,.role-option input:checked + label span{color:var(--gold)}
    .btn-login{width:100%;background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));color:#0a0a14;border:none;border-radius:12px;padding:13px;font-size:.98rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;margin-top:6px}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.4)}
    .alert{padding:11px 15px;border-radius:10px;font-size:.83rem;font-weight:600;margin-bottom:14px;align-items:center;gap:8px;display:none}
    .alert.show{display:flex}
    .alert.error{background:rgba(227,24,55,.15);border:1px solid rgba(227,24,55,.3);color:#ff6b7a}
    .alert.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
    .forgot-link{text-align:center;margin-top:14px}
    .forgot-link a{color:var(--gold);font-size:.83rem;text-decoration:none;font-weight:600}
    .help-strip{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:11px 14px;margin-top:18px;display:flex;align-items:center;gap:9px;font-size:.8rem;color:var(--muted)}
    .help-strip i{color:var(--gold);flex-shrink:0}
    .security-badge{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
    .sec-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)}
    .sec-item i{color:var(--gold);font-size:.8rem}
  </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="stars" id="stars"></div>
<div class="login-wrap">
  <div class="brand-header">
    <div class="brand-badge">
      <img class="brand-logo" src="../images/logo.png" alt="Worlds of Wonder" style="height:48px;width:auto;object-fit:contain;filter:none!important;" />
      <div class="brand-badge-text">
        <div class="brand-name">Worlds of Wonder</div>
        <div class="brand-sub">Passport Sales Portal</div>
      </div>
    </div>
    <div class="page-title">Sales <span>Agent</span> Login</div>
    <div class="page-sub">Authorized field sales personnel only</div>
  </div>
  <div class="login-card">
    <h2><i class="fas fa-id-badge"></i> Sign In to Your Account</h2>
    <div class="alert error show" id="errAlert" style="display:none"><i class="fas fa-exclamation-circle"></i><span id="errMsg"></span></div>
    <div class="alert success" id="okAlert" style="display:none"><i class="fas fa-check-circle"></i><span id="okMsg"></span></div>
    <div class="field-group">
      <label>Your Role</label>
      <div class="role-selector">
        <div class="role-option">
          <input type="radio" name="role" id="rAgent" value="agent" checked/>
          <label for="rAgent"><i class="fas fa-user-tie"></i><span>Field Agent</span></label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="rManager" value="manager"/>
          <label for="rManager"><i class="fas fa-users-cog"></i><span>Team Manager</span></label>
        </div>
      </div>
    </div>
    <div class="field-group">
      <label>Employee ID / Email</label>
      <div class="input-wrap">
        <i class="fas fa-user fi"></i>
        <input type="text" id="empId" placeholder="EMP-001 or name@wow.com"/>
      </div>
    </div>
    <div class="field-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock fi"></i>
        <input type="password" id="pwd" placeholder="Enter your password"/>
        <button class="toggle-pw" id="togglePw" type="button"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <div class="field-group">
      <label>Agent PIN (4-digit)</label>
      <div class="input-wrap">
        <i class="fas fa-shield-alt fi"></i>
        <input type="password" id="pin" placeholder="●●●●" maxlength="4" inputmode="numeric"/>
      </div>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In to Sales Portal
    </button>
    <div class="forgot-link"><a href="/cdn-cgi/l/email-protection#8ce5f8a1fff9fcfce3fef8ccfbe3fba2efe3e1"><i class="fas fa-life-ring"></i> Need help? Contact IT Support</a></div>
    <div class="help-strip"><i class="fas fa-info-circle"></i><span>This portal is exclusively for WOW Passport Sales Team. Unauthorized access is monitored and reported.</span></div>
    <div class="security-badge">
      <div class="sec-item"><i class="fas fa-lock"></i> SSL Secured</div>
      <div class="sec-item"><i class="fas fa-eye-slash"></i> Encrypted</div>
      <div class="sec-item"><i class="fas fa-history"></i> Audit Logged</div>
    </div>
  </div>
</div>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
(function(){const s=document.getElementById('stars');for(let i=0;i<80;i++){const el=document.createElement('div');el.className='star';el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2.5+.5}px;height:${Math.random()*2.5+.5}px;--d:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s`;s.appendChild(el)}})();
document.getElementById('togglePw').addEventListener('click',function(){const i=document.getElementById('pwd'),ic=this.querySelector('i');i.type=i.type==='password'?'text':'password';ic.className=i.type==='text'?'fas fa-eye-slash':'fas fa-eye'});
const AGENTS=[{id:'EMP-001',email:'raj.sharma@wow.com',pwd:'Pass@1234',pin:'1234',name:'Raj Sharma',role:'agent',target:50,sold:23,zone:'North Delhi',team:'Alpha'},{id:'EMP-002',email:'priya.singh@wow.com',pwd:'Pass@1234',pin:'2345',name:'Priya Singh',role:'agent',target:60,sold:41,zone:'Rohini',team:'Alpha'},{id:'EMP-003',email:'karan.verma@wow.com',pwd:'Pass@1234',pin:'3456',name:'Karan Verma',role:'agent',target:45,sold:18,zone:'Dwarka',team:'Beta'},{id:'MGR-001',email:'amit.kumar@wow.com',pwd:'Mgr@5678',pin:'5678',name:'Amit Kumar',role:'manager',target:200,sold:142,zone:'All Zones',team:'Management'}];
function showErr(m){const a=document.getElementById('errAlert');document.getElementById('errMsg').textContent=m;a.style.display='flex';document.getElementById('okAlert').style.display='none'}
function showOk(m){const a=document.getElementById('okAlert');document.getElementById('okMsg').textContent=m;a.style.display='flex';document.getElementById('errAlert').style.display='none'}
function doLogin(){
  const empId=document.getElementById('empId').value.trim();
  const pwd=document.getElementById('pwd').value;
  const pin=document.getElementById('pin').value;
  const role=document.querySelector('input[name=role]:checked').value;
  if(!empId||!pwd||!pin){showErr('All fields are required.');return}
  if(pin.length!==4||isNaN(pin)){showErr('PIN must be exactly 4 digits.');return}
  const btn=document.getElementById('loginBtn');
  btn.style.opacity='.7';btn.style.cursor='not-allowed';btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>&nbsp; Authenticating…';
  setTimeout(()=>{
    const a=AGENTS.find(a=>(a.id===empId||a.email===empId)&&a.pwd===pwd&&a.pin===pin&&a.role===role);
    if(a){
      sessionStorage.setItem('sales_agent',JSON.stringify(a));
      sessionStorage.setItem('sales_auth',btoa(empId+':'+Date.now()));
      showOk('Welcome '+a.name+'! Loading your dashboard…');
      setTimeout(()=>window.location.href='passport-dashboard.html',1200);
    } else {
      showErr('Invalid credentials or PIN. Please check and try again.');
      btn.style.opacity='1';btn.style.cursor='pointer';btn.innerHTML='<i class="fas fa-sign-in-alt"></i>&nbsp; Sign In to Sales Portal';
    }
  },1200);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
<script src="https://www.genspark.ai/sandbox_inspect.js"></script></body>
</html>
