version: '3.9'

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       wow_bookings
      POSTGRES_USER:     wow_user
      POSTGRES_PASSWORD: wow_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wow_user -d wow_bookings"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wow_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://wow_user:wow_pass@postgres:5432/wow_bookings
      REDIS_URL:    redis://redis:6379
      NODE_ENV:     development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules      # prevent host node_modules from overriding
    command: npm run dev

  # ── pgAdmin (optional DB GUI) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@wow.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools     # only starts with: docker-compose --profile tools up

volumes:
  pg_data:
  redis_data:
