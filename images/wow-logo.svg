<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <defs>
    <filter id="txtShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
    <filter id="badgeShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- Badge body: red fill with navy blue border — authentic WOW shield shape -->
  <!-- Shield: wide top, slightly curved sides, concave bottom arc -->
  <g filter="url(#badgeShadow)">
    <!-- Navy border (slightly larger path underneath) -->
    <path d="M 22,6 Q 160,2 298,6 L 294,62 Q 270,88 160,96 Q 50,88 26,62 Z"
          fill="#1a237e" />
    <!-- Red fill (inner) -->
    <path d="M 28,10 Q 160,6 292,10 L 288,60 Q 266,84 160,92 Q 54,84 32,60 Z"
          fill="#CC1111" />
  </g>

  <!-- "Worlds of Wonder" in white gothic-style text, centered -->
  <!-- Using a serif bold as fallback for the blackletter style -->
  <text
    x="160" y="58"
    font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif"
    font-size="33"
    font-weight="900"
    font-style="italic"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
    filter="url(#txtShadow)"
  >Worlds of Wonder</text>

  <!-- Subtitle row 1 -->
  <text
    x="160" y="82"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="9.5"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="1.2"
    opacity="0.88"
  >AMUSEMENT PARK  ·  WATER PARK</text>

  <!-- Subtitle row 2 -->
  <text
    x="160" y="95"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="8"
    font-weight="700"
    fill="rgba(255,255,255,0.65)"
    text-anchor="middle"
    letter-spacing="1.5"
  >ENTERTAINMENT CITY  ·  NOIDA</text>

</svg>
