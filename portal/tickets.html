<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tickets — Worlds of Wonder</title>
  <meta name="description" content="View and download your Worlds of Wonder e-tickets with QR codes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="stylesheet" href="../css/forms.css" />
  <script src="../js/wow-modules.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    /* ── Filter tabs ── */
    .tickets-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.12);
      background: transparent;
      color: rgba(255,255,255,.55);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #0055B3;
      border-color: #0055B3;
      color: #fff;
    }

    /* ── Ticket card ── */
    .ticket-card {
      background: #1a2235;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      transition: box-shadow .2s;
    }
    .ticket-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.35); }

    .ticket-header {
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
    }
    .ticket-park-icon { font-size: 32px; flex-shrink: 0; }
    .ticket-header-info { flex: 1; min-width: 0; }
    .ticket-park-name { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: #fff; margin-bottom: 2px; }
    .ticket-sub { font-size: 12px; color: rgba(255,255,255,.5); }
    .ticket-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-upcoming { background: rgba(29,78,216,.2);  color: #60a5fa; border: 1px solid rgba(29,78,216,.3); }
    .status-today    { background: rgba(161,98,7,.2);   color: #F5A800; border: 1px solid rgba(161,98,7,.3); }
    .status-used     { background: rgba(255,255,255,.06);color: rgba(255,255,255,.35);border: 1px solid rgba(255,255,255,.1); }
    .status-valid    { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.25); }
    .status-cancelled{ background: rgba(239,68,68,.12);  color: #ef4444; border: 1px solid rgba(239,68,68,.2); }

    /* ── Ticket body: QR + details ── */
    .ticket-body {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 0;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    @media(max-width:640px){ .ticket-body { grid-template-columns: 1fr; } }

    .ticket-details { padding: 20px 24px; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }
    @media(max-width:500px){ .detail-grid { grid-template-columns: repeat(2, 1fr); } }
    .detail-item { }
    .detail-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
    .detail-value { font-size: 14px; font-weight: 600; color: #fff; }

    .guest-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .guest-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255,255,255,.65);
    }

    /* QR column */
    .ticket-qr-col {
      border-left: 1px dashed rgba(255,255,255,.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.015);
      position: relative;
    }
    .ticket-qr-col::before, .ticket-qr-col::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: #0f1726;
      border-radius: 50%;
    }
    .ticket-qr-col::before { left: -9px; top: -9px; }
    .ticket-qr-col::after  { left: -9px; bottom: -9px; }
    @media(max-width:640px){ .ticket-qr-col { border-left: none; border-top: 1px dashed rgba(255,255,255,.1); border-radius: 0; } }

    .qr-box {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .qr-id {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: rgba(255,255,255,.35);
      letter-spacing: .06em;
      text-align: center;
      word-break: break-all;
    }

    /* ── Actions bar ── */
    .ticket-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px 24px;
      border-top: 1px solid rgba(255,255,255,.05);
      background: rgba(255,255,255,.015);
    }
    .tkt-btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
      text-decoration: none;
    }
    .tkt-btn-primary { background: rgba(0,85,179,.2); color: #60a5fa; border: 1px solid rgba(0,85,179,.3); }
    .tkt-btn-primary:hover { background: rgba(0,85,179,.35); }
    .tkt-btn-green { background: rgba(16,185,129,.1); color: #10b981; border: 1px solid rgba(16,185,129,.2); }
    .tkt-btn-green:hover { background: rgba(16,185,129,.2); }
    .tkt-btn-red { background: rgba(239,68,68,.08); color: #ef4444; border: 1px solid rgba(239,68,68,.15); }
    .tkt-btn-red:hover { background: rgba(239,68,68,.15); }
    .tkt-btn-grey { background: rgba(255,255,255,.06); color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.1); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 64px 24px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 800; color: rgba(255,255,255,.5); font-family: 'Nunito', sans-serif; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: rgba(255,255,255,.3); margin-bottom: 24px; }

    /* ── Modal (full QR view) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: linear-gradient(135deg, #060e24, #0a1628);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      padding: 32px;
      text-align: center;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,.08);
      border-radius: 50%;
      border: none;
      color: rgba(255,255,255,.6);
      font-size: 16px;
      cursor: pointer;
    }
    .modal-park { font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
    .modal-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 20px; }
    .modal-qr-box { background: #fff; border-radius: 16px; padding: 16px; display: inline-block; margin-bottom: 16px; }
    .modal-ticket-id { font-family: 'Courier New', monospace; font-size: 14px; color: rgba(255,255,255,.6); letter-spacing: .1em; margin-bottom: 20px; }
    .modal-date { font-size: 16px; font-weight: 700; color: #F5A800; margin-bottom: 8px; }
    .modal-guests { font-size: 13px; color: rgba(255,255,255,.55); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .modal-btn {
      padding: 11px 22px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .modal-btn-blue { background: linear-gradient(135deg, #0055B3, #0073E6); color: #fff; }
    .modal-btn-green{ background: linear-gradient(135deg, #0a9b5f, #047857); color: #fff; }
    .modal-btn-grey { background: rgba(255,255,255,.08); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.15); }
  </style>
</head>

<!-- ── Full QR Modal ── -->
<div class="modal-overlay" id="qr-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('qr-modal').classList.remove('open')">✕</button>
    <div class="modal-park" id="modal-park">Water Park · Day Entry</div>
    <div class="modal-title" id="modal-name">Rahul Sharma</div>
    <div class="modal-qr-box">
      <canvas id="modal-qr-canvas"></canvas>
    </div>
    <div class="modal-ticket-id" id="modal-ticket-id">WOW-XXXXXXXX</div>
    <div class="modal-date" id="modal-date">—</div>
    <div class="modal-guests" id="modal-guests">—</div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-blue" onclick="window.print()">🖨 Print</button>
      <button class="modal-btn modal-btn-green" id="modal-whatsapp-btn">📲 WhatsApp</button>
      <button class="modal-btn modal-btn-grey" onclick="document.getElementById('qr-modal').classList.remove('open')">Close</button>
    </div>

</div>

<script>
  const PARK_LABELS = {
    WATER_DAY:    { name: '🌊 Water Park — Day Entry', color: '#006EE6', gradient: 'linear-gradient(135deg,#006EE6,#0044a0)' },
    AMUSEMENT_DAY:{ name: '🎢 Amusement Park — Day Entry', color: '#7c3aed', gradient: 'linear-gradient(135deg,#7c3aed,#4f46e5)' },
    COMBO:        { name: '🎟 Combo — Both Parks', color: '#FF6B00', gradient: 'linear-gradient(135deg,#FF6B00,#cc4a00)' },
    PASSPORT:     { name: '🪪 Annual Passport Visit', color: '#0a9b5f', gradient: 'linear-gradient(135deg,#0a9b5f,#047857)' },
  };

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });
  }
  function inr(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

  function getStatus(ticket) {
    if (ticket.status === 'cancelled') return { cls: 'status-cancelled', label: '✕ Cancelled' };
    const d = new Date(ticket.visitDate);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const visit = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (visit < today) return { cls: 'status-used', label: '✓ Used' };
    if (visit.getTime() === today.getTime()) return { cls: 'status-today', label: '⚡ Today!' };
    return { cls: 'status-upcoming', label: '📅 Upcoming' };
  }

  // Build demo tickets based on user
  function buildDemoTickets(uid) {
    const base = Date.now();
    return [
      {
        id: 'WOW-' + uid.substring(0,6).toUpperCase() + '-001',
        parkKey: 'WATER_DAY',
        visitDate: new Date(base + 7 * 86400000).toISOString().slice(0,10),
        guestName: 'Account Holder',
        adults: 2, children: 1, seniors: 0,
        totalPaid: 3597,
        status: 'confirmed',
        bookingRef: 'BK-2026-08142',
      },
      {
        id: 'WOW-' + uid.substring(0,6).toUpperCase() + '-002',
        parkKey: 'COMBO',
        visitDate: new Date(base - 14 * 86400000).toISOString().slice(0,10),
        guestName: 'Account Holder',
        adults: 2, children: 0, seniors: 0,
        totalPaid: 3998,
        status: 'used',
        bookingRef: 'BK-2026-04291',
      },
      {
        id: 'WOW-' + uid.substring(0,6).toUpperCase() + '-003',
        parkKey: 'AMUSEMENT_DAY',
        visitDate: new Date(base - 45 * 86400000).toISOString().slice(0,10),
        guestName: 'Account Holder',
        adults: 3, children: 2, seniors: 0,
        totalPaid: 6597,
        status: 'used',
        bookingRef: 'BK-2026-01772',
      },
      {
        id: 'WOW-' + uid.substring(0,6).toUpperCase() + '-004',
        parkKey: 'WATER_DAY',
        visitDate: new Date(base - 5 * 86400000).toISOString().slice(0,10),
        guestName: 'Account Holder',
        adults: 1, children: 0, seniors: 0,
        totalPaid: 1299,
        status: 'cancelled',
        bookingRef: 'BK-2026-07103',
      },
    ];
  }

  let allTickets = [];
  let currentFilter = 'all';

  function renderTickets(filter) {
    currentFilter = filter;
    const list = document.getElementById('tickets-list');
    let tickets = allTickets;

    if (filter === 'upcoming')  tickets = tickets.filter(t => getStatus(t).label.includes('Upcoming'));
    if (filter === 'today')     tickets = tickets.filter(t => getStatus(t).label.includes('Today'));
    if (filter === 'past')      tickets = tickets.filter(t => getStatus(t).cls === 'status-used');
    if (filter === 'cancelled') tickets = tickets.filter(t => t.status === 'cancelled');

    if (tickets.length === 0) {
      list.innerHTML = `
        <div class="ticket-card">
          <div class="empty-state">
            <div class="empty-icon">🎟</div>
            <div class="empty-title">No tickets found</div>
            <div class="empty-sub">${filter === 'all' ? "You haven't booked any tickets yet." : "No " + filter + " tickets."}</div>
            <a href="../book/water-park.html" class="btn btn-primary">Book Your First Visit →</a>
          </div>
        </div>`;
      return;
    }

    list.innerHTML = tickets.map((t, i) => {
      const park = PARK_LABELS[t.parkKey] || PARK_LABELS['WATER_DAY'];
      const status = getStatus(t);
      const guestStr = [
        t.adults > 0 ? `${t.adults} Adult${t.adults > 1 ? 's' : ''}` : '',
        t.children > 0 ? `${t.children} Child${t.children > 1 ? 'ren' : ''}` : '',
        t.seniors > 0 ? `${t.seniors} Senior${t.seniors > 1 ? 's' : ''}` : '',
      ].filter(Boolean).join(' · ');

      const canCancel = status.cls === 'status-upcoming';
      const canView   = status.cls !== 'status-cancelled';

      return `
        <div class="ticket-card" id="tcard-${t.id}">
          <div class="ticket-header" style="background:${park.gradient}">
            <div class="ticket-park-icon" style="font-size:28px;">${park.name.split(' ')[0]}</div>
            <div class="ticket-header-info">
              <div class="ticket-park-name">${park.name.replace(/^[^\s]+\s/, '')}</div>
              <div class="ticket-sub">${t.bookingRef} · Booked for ${fmtDate(t.visitDate)}</div>
            </div>
            <div class="ticket-status-badge ${status.cls}">${status.label}</div>
          </div>

          <div class="ticket-body">
            <div class="ticket-details">
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-label">Visit Date</div>
                  <div class="detail-value">${fmtDate(t.visitDate)}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Total Paid</div>
                  <div class="detail-value">${inr(t.totalPaid)}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Ticket ID</div>
                  <div class="detail-value" style="font-family:'Courier New',monospace;font-size:12px;">${t.id}</div>
                </div>
              </div>
              <div class="detail-label">Guests</div>
              <div class="guest-pills" style="margin-top:6px;">
                ${t.adults > 0 ? `<span class="guest-pill">👨 ${t.adults} Adult${t.adults > 1 ? 's' : ''}</span>` : ''}
                ${t.children > 0 ? `<span class="guest-pill">👧 ${t.children} Child${t.children > 1 ? 'ren' : ''}</span>` : ''}
                ${t.seniors > 0 ? `<span class="guest-pill">🧓 ${t.seniors} Senior${t.seniors > 1 ? 's' : ''}</span>` : ''}
              </div>
            </div>
            ${canView ? `
            <div class="ticket-qr-col">
              <div class="qr-box" id="qr-mini-${i}"></div>
              <div class="qr-id">${t.id}</div>
            </div>` : `<div style="display:flex;align-items:center;justify-content:center;padding:20px;color:rgba(255,255,255,.25);font-size:13px;">Cancelled</div>`}
          </div>

          <div class="ticket-actions">
            ${canView ? `<button class="tkt-btn tkt-btn-primary" onclick="openQRModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">🔍 Full QR View</button>` : ''}
            ${canView ? `<button class="tkt-btn tkt-btn-green" onclick="shareTicket('${t.id}', '${park.name}', '${t.visitDate}')">📲 Share</button>` : ''}
            <button class="tkt-btn tkt-btn-grey" onclick="window.print()">🖨 Print</button>
            ${canCancel ? `<button class="tkt-btn tkt-btn-red" onclick="cancelTicket('${t.id}')">✕ Cancel</button>` : ''}
          </div>
        </div>`;
    }).join('');

    // Generate mini QRs
    tickets.forEach((t, i) => {
      if (t.status === 'cancelled') return;
      const el = document.getElementById('qr-mini-' + i);
      if (el && typeof QRCode !== 'undefined') {
        const canvas = document.createElement('canvas');
        el.appendChild(canvas);
        QRCode.toCanvas(canvas, JSON.stringify({ id: t.id, park: t.parkKey, date: t.visitDate, guests: t.adults + (t.children||0) }), {
          width: 100, margin: 0, color: { dark: '#060e24', light: '#ffffff' }, errorCorrectionLevel: 'M'
        });
      }
    });
  }

  window.filterTickets = function(filter, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTickets(filter);
  };

  window.openQRModal = function(ticket) {
    const park = PARK_LABELS[ticket.parkKey] || PARK_LABELS['WATER_DAY'];
    document.getElementById('modal-park').textContent = park.name.replace(/^[^\s]+\s/, '');
    document.getElementById('modal-name').textContent = ticket.guestName || 'Guest';
    document.getElementById('modal-ticket-id').textContent = ticket.id;
    document.getElementById('modal-date').textContent = '📅 ' + fmtDate(ticket.visitDate);
    document.getElementById('modal-guests').textContent = [
      ticket.adults > 0 ? ticket.adults + ' Adult' + (ticket.adults > 1 ? 's' : '') : '',
      ticket.children > 0 ? ticket.children + ' Child' + (ticket.children > 1 ? 'ren' : '') : '',
    ].filter(Boolean).join(' + ') + ' · Total: ' + inr(ticket.totalPaid);

    // Big QR
    const canvas = document.getElementById('modal-qr-canvas');
    canvas.width = 0; canvas.height = 0; // clear
    if (typeof QRCode !== 'undefined') {
      QRCode.toCanvas(canvas, JSON.stringify({ id: ticket.id, park: ticket.parkKey, date: ticket.visitDate, name: ticket.guestName }), {
        width: 220, margin: 2, color: { dark: '#060e24', light: '#ffffff' }, errorCorrectionLevel: 'H'
      });
    }

    // WhatsApp share
    const msg = encodeURIComponent(`🎟 My WOW Ticket\nPark: ${park.name}\nDate: ${fmtDate(ticket.visitDate)}\nID: ${ticket.id}\n\nBookings: https://worldsofwonder.in`);
    document.getElementById('modal-whatsapp-btn').onclick = () => window.open('https://wa.me/?text=' + msg, '_blank');

    document.getElementById('qr-modal').classList.add('open');
  };

  window.closeModal = function(e) {
    if (e.target === document.getElementById('qr-modal')) {
      document.getElementById('qr-modal').classList.remove('open');
    }
  };

  window.shareTicket = function(id, park, date) {
    const msg = `🎟 WOW Ticket — ${park}\n📅 ${fmtDate(date)}\nID: ${id}\n\nWorldsofWonder.in`;
    if (navigator.share) navigator.share({ text: msg }).catch(() => {});
    else navigator.clipboard.writeText(msg).then(() => alert('Ticket info copied to clipboard!'));
  };

  window.cancelTicket = function(id) {
    if (confirm('Are you sure you want to cancel this ticket? Cancellation is subject to our refund policy.')) {
      const t = allTickets.find(x => x.id === id);
      if (t) { t.status = 'cancelled'; renderTickets(currentFilter); }
    }
  };
</script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { WOW_FB_CONFIG } from '../js/firebase-config.js';

  const app  = initializeApp(WOW_FB_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    document.getElementById('portal-loading').style.display = 'none';
    document.getElementById('portal-content').style.display = 'block';

    // Try Firestore bookings
    let tickets = [];
    try {
      const q = query(
        collection(db, 'bookings'),
        where('userId', '==', user.uid),
        orderBy('visitDate', 'desc')
      );
      const snaps = await getDocs(q);
      snaps.forEach(d => tickets.push({ id: d.id, ...d.data() }));
    } catch {
      console.warn('[WOW] Firestore not available, using demo tickets');
    }

    // Use demo if no real data
    if (tickets.length === 0) {
      tickets = buildDemoTickets(user.uid);
    }

    window.allTickets = tickets;
    renderTickets('all');
  });

  document.getElementById('signout-btn')?.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '../index.html';
  });
</script>
<script src="https://www.genspark.ai/sandbox_inspect.js"></script></body>
</html>
