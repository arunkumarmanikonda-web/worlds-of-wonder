<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Worlds of Wonder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portal.css" />
</head>
<body>
<div id="app">
  <div class="portal-dashboard">
    <!-- Sidebar -->
    <aside class="portal-sidebar" id="portal-sidebar">
      <div class="portal-sidebar-logo">
        <a href="../index.html"><img src="../images/logo.png" alt="Worlds of Wonder" style="height:52px;width:auto;object-fit:contain;filter:none!important;" /></a>
      </div>
      <nav class="portal-sidenav">
        <a href="my-bookings.html" class="portal-sidenav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          My Bookings
        </a>
        <a href="passport.html" class="portal-sidenav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 3v18M2 9h6M2 15h6"/></svg>
          My Passport
        </a>
        <a href="profile.html" class="portal-sidenav-item active">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="offers.html" class="portal-sidenav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          My Offers
        </a>
        <div class="portal-sidenav-divider"></div>
        <a href="../index.html" class="portal-sidenav-item">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          Back to Website
        </a>
        <button class="portal-sidenav-item portal-signout-btn" id="signout-btn">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </nav>
    </aside>

    <main class="portal-main">
      <div id="portal-loading" class="portal-loading"><div class="portal-spinner"></div><p>Loading…</p></div>
      <div id="portal-content" style="display:none;">

        <div class="portal-main-header">
          <div>
            <h1 class="portal-main-title">My Profile</h1>
            <p class="portal-main-sub">Manage your account details and preferences</p>
          </div>
        </div>

        <div class="portal-profile-grid">
          <!-- Avatar + name card -->
          <div class="portal-card">
            <div class="portal-avatar-wrap" id="avatar-wrap">
              <div class="portal-avatar" id="avatar-circle">—</div>
              <div>
                <div class="portal-avatar-name" id="avatar-name">—</div>
                <div class="portal-avatar-email" id="avatar-email">—</div>
                <span class="portal-avatar-badge" id="avatar-provider">Email account</span>
              </div>
            </div>
          </div>

          <!-- Edit profile form -->
          <div class="portal-card">
            <div class="portal-card-title">Personal Details</div>
            <form id="profile-form">
              <div class="form-grid">
                <div class="portal-field">
                  <label class="portal-label">First Name</label>
                  <input class="portal-input" id="p-fname" type="text" placeholder="First name" />
                </div>
                <div class="portal-field">
                  <label class="portal-label">Last Name</label>
                  <input class="portal-input" id="p-lname" type="text" placeholder="Last name" />
                </div>
              </div>
              <div class="portal-field">
                <label class="portal-label">Mobile Number</label>
                <div class="portal-input-prefix-wrap">
                  <span class="portal-input-prefix">+91</span>
                  <input class="portal-input portal-input--prefixed" id="p-mobile" type="tel" placeholder="10-digit number" maxlength="10" />
                </div>
              </div>
              <div class="portal-field">
                <label class="portal-label">Email (cannot change)</label>
                <input class="portal-input" id="p-email" type="email" disabled style="opacity:.6;cursor:not-allowed;" />
              </div>
              <button type="submit" class="portal-submit-btn portal-submit-btn--blue" id="profile-save">Save Changes</button>
              <div class="portal-error-banner hidden" id="profile-msg"></div>
            </form>
          </div>

          <!-- Change password -->
          <div class="portal-card" id="change-pw-card">
            <div class="portal-card-title">Change Password</div>
            <form id="pw-form">
              <div class="portal-field">
                <label class="portal-label">Current Password</label>
                <input class="portal-input" id="cur-pw" type="password" placeholder="Current password" />
              </div>
              <div class="portal-field">
                <label class="portal-label">New Password</label>
                <input class="portal-input" id="new-pw" type="password" placeholder="New password (8+ chars)" />
              </div>
              <div class="portal-field">
                <label class="portal-label">Confirm New Password</label>
                <input class="portal-input" id="conf-pw" type="password" placeholder="Repeat new password" />
              </div>
              <button type="submit" class="portal-submit-btn portal-submit-btn--blue" id="pw-save">Update Password</button>
              <div class="portal-error-banner hidden" id="pw-msg"></div>
            </form>
          </div>

          <!-- Danger zone -->
          <div class="portal-card portal-card--danger">
            <div class="portal-card-title" style="color:#dc2626;">Account</div>
            <p style="font-size:13.5px;color:#6b7280;margin-bottom:16px;">Sign out of your account on this device.</p>
            <button class="portal-submit-btn" style="background:#f4f7fb;color:#374151;box-shadow:none;" id="signout-card-btn">Sign Out of Account</button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut, updateProfile, updatePassword, reauthenticateWithCredential, EmailAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { WOW_FB_CONFIG } from '../js/firebase-config.js';

  const app  = initializeApp(WOW_FB_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    document.getElementById('portal-loading').style.display = 'none';
    document.getElementById('portal-content').style.display = 'block';

    // Avatar initials
    const name = user.displayName || user.email || '';
    const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase() || '?';
    document.getElementById('avatar-circle').textContent = initials;
    document.getElementById('avatar-name').textContent  = user.displayName || 'No name set';
    document.getElementById('avatar-email').textContent = user.email;

    const provider = user.providerData[0]?.providerId;
    document.getElementById('avatar-provider').textContent = provider === 'google.com' ? 'Google account' : 'Email account';
    if (provider === 'google.com') document.getElementById('change-pw-card').style.display = 'none';

    // Fill form
    document.getElementById('p-email').value = user.email || '';
    const parts = (user.displayName || '').split(' ');
    document.getElementById('p-fname').value = parts[0] || '';
    document.getElementById('p-lname').value = parts.slice(1).join(' ') || '';

    // Load mobile from Firestore
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) document.getElementById('p-mobile').value = snap.data().mobile || '';
    } catch {}
  });

  function showMsg(id, msg, isErr = true) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.style.background = isErr ? '#fef2f2' : '#f0fdf4';
    el.style.color = isErr ? '#dc2626' : '#065f46';
    el.style.borderColor = isErr ? '#fecaca' : '#a7f3d0';
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 4000);
  }

  document.getElementById('profile-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentUser) return;
    const fname  = document.getElementById('p-fname').value.trim();
    const lname  = document.getElementById('p-lname').value.trim();
    const mobile = document.getElementById('p-mobile').value.trim();
    const btn    = document.getElementById('profile-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await updateProfile(currentUser, { displayName: `${fname} ${lname}`.trim() });
      await setDoc(doc(db, 'users', currentUser.uid), { name: `${fname} ${lname}`.trim(), mobile, updatedAt: serverTimestamp() }, { merge: true });
      document.getElementById('avatar-name').textContent = `${fname} ${lname}`.trim();
      showMsg('profile-msg', '✅ Profile updated successfully!', false);
    } catch (err) {
      showMsg('profile-msg', 'Failed to save: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  });

  document.getElementById('pw-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const cur  = document.getElementById('cur-pw').value;
    const nw   = document.getElementById('new-pw').value;
    const conf = document.getElementById('conf-pw').value;
    if (nw !== conf) { showMsg('pw-msg', 'New passwords do not match'); return; }
    if (nw.length < 8) { showMsg('pw-msg', 'New password must be at least 8 characters'); return; }
    const btn = document.getElementById('pw-save');
    btn.disabled = true; btn.textContent = 'Updating…';
    try {
      const cred = EmailAuthProvider.credential(currentUser.email, cur);
      await reauthenticateWithCredential(currentUser, cred);
      await updatePassword(currentUser, nw);
      document.getElementById('cur-pw').value = '';
      document.getElementById('new-pw').value = '';
      document.getElementById('conf-pw').value = '';
      showMsg('pw-msg', '✅ Password updated successfully!', false);
    } catch (err) {
      const map = {
        'auth/wrong-password':  'Current password is incorrect.',
        'auth/weak-password':   'New password is too weak.',
        'auth/too-many-requests': 'Too many attempts. Try again later.',
      };
      showMsg('pw-msg', map[err.code] || err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Update Password';
    }
  });

  ['signout-btn','signout-card-btn'].forEach(id => {
    document.getElementById(id)?.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '../index.html';
    });
  });
</script>
</body>
</html>
